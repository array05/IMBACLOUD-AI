services:
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: imbai-worker
    restart: unless-stopped
    env_file:
      - .env.worker
    ports:
      - "${WORKER_PORT:-9090}:9090"
    volumes:
      - ${WORKER_WORKSPACE:-/opt/client/project}:${WORKER_WORKSPACE:-/opt/client/project}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
